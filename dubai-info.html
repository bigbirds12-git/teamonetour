    <h1>두바이 정보</h1>
    <p>두바이는 아랍에미리트(UAE)의 대표적인 도시로, 현대적인 건축물과 관광 명소로 유명합니다.</p>

    <h2>주요 관광지</h2>
    <ul>
        <li>부르즈 칼리파 (세계에서 가장 높은 빌딩)</li>
        <li>두바이 몰 (세계 최대 쇼핑몰 중 하나)</li>
        <li>팜 주메이라 (야자수 모양의 인공섬)</li>
        <li>두바이 분수 쇼</li>
    </ul>

    <h2>기후</h2>
    <p>두바이는 사막 기후로, 여름은 매우 덥고 겨울은 온화합니다.</p>

    <h2>여행 팁</h2>
    <p>겨울(11~3월)이 여행하기 가장 좋은 시기입니다.</p>
